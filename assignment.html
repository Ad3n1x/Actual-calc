<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            gap: 50px;
        }

        .div1 {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 10px;
            flex-wrap: wrap;
        }

        .select1 {
            width: 50px;
            height: 30px;
            text-align: center;
        }

        .button1,
        .button2 {
            /* width: 30px; */
            height: 30px;
            text-align: center;
            padding: 0px 10px;
        }

        .div2 {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            max-width: 95%;
            flex-wrap: wrap;
        }

        .input4 {
            width: 100%;
            height: 30px;
            text-align: center;
        }

        .div3 {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            border: 2px solid black;
            padding: 10px;
            width: 90%;
        }

        .div5 {
            width: 90%;
        }

        .input5 {
            width: 48%;
            height: 30px;
            text-align: center;
        }

        .input3 {
            width: 30%;
            height: 30px;
            text-align: center;
        }

        .input6 {
            width: 30%;
            height: 30px;
            text-align: center;
        }

        .div6 {
            display: flex;
            width: 90%;
            padding: 20px;
            border: 2px solid black;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-wrap: wrap;
        }
    </style>
    <div class="div3">
        <h2>Grade Calculator</h2>
        <div class="div2">
            <div class="div5">
                <input type="text" id="nameinput" class="input5" placeholder="Enter your name">
                <input type="number" id="scoreinput" class="input5" placeholder="Enter your score">
            </div>
            <input type="text" id="gradeinput" class="input6" placeholder="Your grade will appear here" readonly>
            <input type="text" id="gradefeedback" class="input4" placeholder="Feedback will appear here" readonly>
            <button onclick="displayGrade()" id="result" class="button1">Submit</button>
            <button onclick="clearInputs()" id="clearButton" class="button2">Clear</button>
        </div>
    </div>


    <h2>
        Simple Calculator
    </h2>
    <div class="div6">
        <div class="div1">
            <input type="number" id="num1input" class="input5">
            <select name="" id="operatorinput" class="select1">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="/">/</option>
                <option value="%">%</option>
            </select>
            <input type="number" id="num2input" class="input3">
            <button onclick="displayResult()" id="calculateButton" class="button1">Submit</button>
            <input type="text" id="operatorsolution" class="input3">
            <button onclick="clearFields()" id="clearButton" class="button2">Clear</button>
        </div>
    </div>

    <script src="assignment.js"></script>
</body>

</html>
